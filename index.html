<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Status</title>

<style>
body { background:#08090d; color:#fff; font-family:sans-serif; padding:20px; }
button { margin:5px; cursor:pointer; }
.list-item { border:1px solid #333; padding:10px; margin:8px 0; }

.edit-modal {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.8);
  display:none; align-items:center; justify-content:center;
}
.edit-modal.visible { display:flex; }

.edit-box {
  background:#111; padding:20px; border-radius:8px; width:300px;
}
.edit-box input {
  width:100%; margin-bottom:10px; padding:8px;
  background:#222; border:1px solid #444; color:#fff;
}
</style>
</head>

<body>

<button onclick="toggleAuth()" id="auth-btn">LOGIN</button>

<h2>Games</h2>
<button onclick="addItem('games')">+ Add Game</button>
<div id="games-list"></div>

<h2>Anime</h2>
<button onclick="addItem('anime')">+ Add Anime</button>
<div id="anime-list"></div>

<!-- EDIT MODAL -->
<div class="edit-modal" id="edit-modal">
  <div class="edit-box">
    <h3>Edit Item</h3>
    <input id="edit-name" placeholder="Name">
    <input id="edit-meta" placeholder="Details">
    <input id="edit-url" placeholder="URL">
    <button onclick="saveEdit()">Save</button>
    <button onclick="closeEdit()">Cancel</button>
  </div>
</div>

<script type="module">

// 🔐 PASSWORD
const PASSWORD = "ookamisama";

// AUTH
function checkAuth(){
  const logged = localStorage.getItem('auth') === 'true';
  document.getElementById('auth-btn').innerText = logged ? 'LOGOUT' : 'LOGIN';
  return logged;
}

window.toggleAuth = function(){
  if(checkAuth()){
    localStorage.setItem('auth','false');
    checkAuth();
  } else {
    const p = prompt("Password:");
    if(p === PASSWORD){
      localStorage.setItem('auth','true');
      checkAuth();
    } else alert("Wrong password");
  }
}

// 🔥 FIREBASE IMPORTS (CORRECT)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ✅ YOUR CONFIG (CLEANED)
const firebaseConfig = {
  apiKey: "AIzaSyC7ON_TBagCxp4YHsTI2v6mWhK81f4f_Yo",
  authDomain: "my-busy-life-status.firebaseapp.com",
  projectId: "my-busy-life-status",
  storageBucket: "my-busy-life-status.firebasestorage.app",
  messagingSenderId: "453294098984",
  appId: "1:453294098984:web:a7c2824b2f019ca859831d"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// COLLECTIONS
const gamesCol = collection(db, "games");
const animeCol = collection(db, "anime");

// ADD
window.addItem = async function(type){
  if(!checkAuth()) return;

  const name = prompt("Name");
  if(!name) return;

  const meta = prompt("Details") || "";
  const url = prompt("URL") || "";

  await addDoc(type === "games" ? gamesCol : animeCol, {
    name, meta, url
  });
}

// DELETE
window.deleteItem = async function(type,id){
  if(!checkAuth()) return;
  await deleteDoc(doc(db, type, id));
}

// EDIT
let currentEdit = null;

window.openEdit = function(type,id,data){
  if(!checkAuth()) return;

  currentEdit = {type,id};

  document.getElementById('edit-name').value = data.name;
  document.getElementById('edit-meta').value = data.meta;
  document.getElementById('edit-url').value = data.url;

  document.getElementById('edit-modal').classList.add('visible');
}

window.closeEdit = function(){
  document.getElementById('edit-modal').classList.remove('visible');
}

window.saveEdit = async function(){
  const {type,id} = currentEdit;

  await updateDoc(doc(db, type, id), {
    name: document.getElementById('edit-name').value,
    meta: document.getElementById('edit-meta').value,
    url: document.getElementById('edit-url').value
  });

  closeEdit();
}

// REAL-TIME LISTENER
function listen(type, containerId){
  const col = collection(db, type);

  onSnapshot(col, snapshot => {
    const container = document.getElementById(containerId);
    container.innerHTML = "";

    snapshot.forEach(docSnap => {
      const d = docSnap.data();

      container.innerHTML += `
        <div class="list-item">
          <b onclick="${d.url ? `window.open('${d.url}','_blank')` : ''}">${d.name}</b><br>
          <small>${d.meta}</small><br>

          <button onclick="openEdit('${type}','${docSnap.id}', ${JSON.stringify(d).replace(/"/g,'&quot;')})">✏️</button>
          <button onclick="deleteItem('${type}','${docSnap.id}')">❌</button>
        </div>
      `;
    });
  });
}

// INIT
checkAuth();
listen("games","games-list");
listen("anime","anime-list");

</script>
</body>
</html>
