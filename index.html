<script type="module">

// 🔐 PASSWORD
const PASSWORD = "ookamisama";

// AUTH
function checkAuth(){
  const logged = localStorage.getItem('auth') === 'true';
  document.body.classList.toggle('edit-mode', logged);
  document.getElementById('auth-btn').innerText = logged ? 'LOGOUT' : 'LOGIN';
  return logged;
}

window.toggleAuth = function(){
  if(checkAuth()){
    localStorage.setItem('auth','false');
    checkAuth();
  } else {
    const p = prompt("Password:");
    if(p === PASSWORD){
      localStorage.setItem('auth','true');
      checkAuth();
    } else alert("Wrong password");
  }
}

// 🔥 FIREBASE

import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  authDomain: "my-busy-life-status.firebaseapp.com",
  projectId: "my-busy-life-status",
  storageBucket: "my-busy-life-status.firebasestorage.app",
  messagingSenderId: "453294098984",
  appId: "1:453294098984:web:a7c2824b2f019ca859831d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ADD ITEM
window.addItem = async function(section, status){
  if(!checkAuth()) return;

  const name = prompt("Name");
  if(!name) return;

  const meta = prompt("Details") || "";
  const url = prompt("URL") || "";

  await addDoc(collection(db, section), {
    name, meta, url, status
  });
}

// DELETE
window.deleteItem = async function(section, id){
  if(!checkAuth()) return;
  await deleteDoc(doc(db, section, id));
}

// EDIT
let currentEdit = null;

window.openEdit = function(section, id, data){
  if(!checkAuth()) return;

  currentEdit = {section, id};

  document.getElementById('edit-name').value = data.name;
  document.getElementById('edit-meta').value = data.meta;
  document.getElementById('edit-url').value = data.url;

  document.getElementById('edit-modal').classList.add('visible');
}

  });

}

// CHANGE STATUS (🔥 NEW)
window.changeStatus = async function(section, id, newStatus){
  await updateDoc(doc(db, section, id), {
    status: newStatus
  });
}

// RENDER
function render(section){
  onSnapshot(collection(db, section), snap => {

    const groups = {
      current: [],
      completed: [],
      next: []
    };

    snap.forEach(d=>{
      const data = d.data();
      const id = d.id;
      groups[data.status || 'current'].push({id, ...data});
    });

    ["current","completed","next"].forEach(status=>{
      const container = document.getElementById(`${section}-${status}-list`);
      if(!container) return;

      container.innerHTML = groups[status].map(item => `
        <div class="list-item">
          <div class="item-info ${item.url ? 'has-url' : ''}"
               ${item.url ? `onclick="window.open('${item.url}','_blank')"` : ''}>
            <div class="item-name">${item.name}</div>
            <div class="item-meta">${item.meta}</div>
          </div>

          <div class="item-actions">

            <!-- 🔥 STATUS DROPDOWN -->
            <select onchange="changeStatus('${section}','${item.id}', this.value)">
              <option value="current" ${item.status==='current'?'selected':''}>Playing</option>
              <option value="completed" ${item.status==='completed'?'selected':''}>Completed</option>
              <option value="next" ${item.status==='next'?'selected':''}>Next</option>
            </select>

            <button onclick="openEdit('${section}','${item.id}', ${JSON.stringify(item).replace(/"/g,'&quot;')})">✏️</button>
            <button onclick="deleteItem('${section}','${item.id}')">×</button>
          </div>
        </div>
      `).join('');
    });

  });
}

// INIT
checkAuth();
render("games");
render("anime");

</script>
