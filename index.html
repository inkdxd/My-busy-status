<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Status</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  color:#fff;
  background:#020617;
}
.container { max-width:900px; margin:auto; padding:20px; }

.list-item {
  border:1px solid #333;
  padding:10px;
  margin:10px 0;
  display:flex;
  justify-content:space-between;
}

button { cursor:pointer; }
</style>
</head>

<body>

<div class="container">
<button onclick="toggleAuth()" id="auth-btn">LOGIN</button>

<h2>Games</h2>
<button onclick="addItem('games')">+ Add</button>
<div id="games"></div>

<h2>Anime</h2>
<button onclick="addItem('anime')">+ Add</button>
<div id="anime"></div>
</div>

<script type="module">

const PASSWORD="ookamisama";

function checkAuth(){
 const logged=localStorage.getItem('auth')==='true';
 document.getElementById('auth-btn').innerText=logged?'LOGOUT':'LOGIN';
 return logged;
}

window.toggleAuth=function(){
 if(checkAuth()){
  localStorage.setItem('auth','false');
 }else{
  const p=prompt("Password:");
  if(p===PASSWORD) localStorage.setItem('auth','true');
 }
 checkAuth();
}

// FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC7ON_TBagCxp4YHsTI2v6mWhK81f4f_Yo",
  authDomain: "my-busy-life-status.firebaseapp.com",
  projectId: "my-busy-life-status"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addItem=async(type)=>{
 if(!checkAuth()) return;
 const name=prompt("Name");
 if(!name) return;
 await addDoc(collection(db,type),{name});
}

window.deleteItem=async(type,id)=>{
 await deleteDoc(doc(db,type,id));
}

function listen(type){
 onSnapshot(collection(db,type),snap=>{
  const el=document.getElementById(type);
  el.innerHTML="";
  snap.forEach(d=>{
   el.innerHTML+=`
   <div class="list-item">
    ${d.data().name}
    <button onclick="deleteItem('${type}','${d.id}')">X</button>
   </div>`;
  });
 });
}

checkAuth();
listen("games");
listen("anime");

</script>

</body>
</html>
