<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Status</title>

<style>
body {
  background:#08090d;
  color:#e2e8f0;
  font-family:'Segoe UI',sans-serif;
  padding:20px;
}

h2 {
  margin-top:30px;
  border-bottom:1px solid #333;
  padding-bottom:5px;
}

button {
  background:#111;
  color:#fff;
  border:1px solid #333;
  padding:6px 10px;
  cursor:pointer;
  border-radius:4px;
}
button:hover { border-color:#0ff4c6; color:#0ff4c6; }

.list-item {
  background:#111;
  border:1px solid #333;
  border-radius:6px;
  padding:12px;
  margin:10px 0;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.item-info { cursor:pointer; }
.item-name { font-weight:600; }
.item-meta { font-size:12px; color:#888; }

.actions button { margin-left:5px; }

/* EDIT MODAL */
.edit-modal {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.8);
  display:none; align-items:center; justify-content:center;
}
.edit-modal.visible { display:flex; }

.edit-box {
  background:#111;
  padding:20px;
  border-radius:8px;
  width:300px;
}

.edit-box input {
  width:100%;
  margin-bottom:10px;
  padding:8px;
  background:#222;
  border:1px solid #444;
  color:#fff;
}
</style>
</head>

<body>

<button onclick="toggleAuth()" id="auth-btn">LOGIN</button>

<h2>Games</h2>
<button onclick="addItem('games')">+ Add Game</button>
<div id="games-list"></div>

<h2>Anime</h2>
<button onclick="addItem('anime')">+ Add Anime</button>
<div id="anime-list"></div>

<!-- EDIT MODAL -->
<div class="edit-modal" id="edit-modal">
  <div class="edit-box">
    <h3>Edit Item</h3>
    <input id="edit-name" placeholder="Name">
    <input id="edit-meta" placeholder="Details">
    <input id="edit-url" placeholder="URL">
    <button onclick="saveEdit()">Save</button>
    <button onclick="closeEdit()">Cancel</button>
  </div>
</div>

<script type="module">

// 🔐 PASSWORD
const PASSWORD = "ookamisama";

// AUTH
function checkAuth(){
  const logged = localStorage.getItem('auth') === 'true';
  document.getElementById('auth-btn').innerText = logged ? 'LOGOUT' : 'LOGIN';
  return logged;
}

window.toggleAuth = function(){
  if(checkAuth()){
    localStorage.setItem('auth','false');
    checkAuth();
  } else {
    const p = prompt("Password:");
    if(p === PASSWORD){
      localStorage.setItem('auth','true');
      checkAuth();
    } else alert("Wrong password");
  }
}

// 🔥 FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC7ON_TBagCxp4YHsTI2v6mWhK81f4f_Yo",
  authDomain: "my-busy-life-status.firebaseapp.com",
  projectId: "my-busy-life-status",
  storageBucket: "my-busy-life-status.firebasestorage.app",
  messagingSenderId: "453294098984",
  appId: "1:453294098984:web:a7c2824b2f019ca859831d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ADD
window.addItem = async function(type){
  if(!checkAuth()) return;

  const name = prompt("Name");
  if(!name) return;

  const meta = prompt("Details") || "";
  const url = prompt("URL") || "";

  await addDoc(collection(db,type), {name,meta,url});
}

// DELETE
window.deleteItem = async function(type,id){
  if(!checkAuth()) return;
  await deleteDoc(doc(db,type,id));
}

// EDIT
let currentEdit=null;

window.openEdit = function(type,id,data){
  if(!checkAuth()) return;

  currentEdit={type,id};

  edit-name.value=data.name;
  edit-meta.value=data.meta;
  edit-url.value=data.url;

  document.getElementById('edit-modal').classList.add('visible');
}

window.closeEdit = function(){
  document.getElementById('edit-modal').classList.remove('visible');
}

window.saveEdit = async function(){
  await updateDoc(doc(db,currentEdit.type,currentEdit.id),{
    name: edit-name.value,
    meta: edit-meta.value,
    url: edit-url.value
  });
  closeEdit();
}

// RENDER
function listen(type,id){
  onSnapshot(collection(db,type), snap=>{
    const el=document.getElementById(id);
    el.innerHTML="";

    snap.forEach(d=>{
      const data=d.data();

      el.innerHTML+=`
      <div class="list-item">
        <div class="item-info" onclick="${data.url ? `window.open('${data.url}','_blank')` : ''}">
          <div class="item-name">${data.name}</div>
          <div class="item-meta">${data.meta}</div>
        </div>

        <div class="actions">
          <button onclick="openEdit('${type}','${d.id}', ${JSON.stringify(data).replace(/"/g,'&quot;')})">✏️</button>
          <button onclick="deleteItem('${type}','${d.id}')">❌</button>
        </div>
      </div>
      `;
    });
  });
}

// INIT
checkAuth();
listen("games","games-list");
listen("anime","anime-list");

</script>
</body>
</html>
